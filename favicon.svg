    <rect x="-8" y="-34" width="16" height="15" rx="2.4" fill="url(#chrome)"/>
    <rect x="-8" y="-29" width="16" height="1.5" fill="#7f858e"/>
    <circle cx="0" cy="-23" r="2.2" fill="#5f656e"/>
  </g>
